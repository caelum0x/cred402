openapi: 3.1.0
info:
  title: Cred402 Public REST API
  version: "1.0.0"
  description: |
    The Cred402 public, externally-versioned REST API (`/v1`).

    Every route runs the same production pipeline: **auth** (scoped API keys) →
    **rate limiting** → **body validation** → **idempotency** (for mutations
    carrying an `Idempotency-Key`) → handler → a consistent success/failure
    envelope with a `request_id`.

    ## Response envelope
    Every response — success or failure — uses one of two shapes:

    - Success: `{ "success": true, "data": <payload>, "request_id": "req_..." }`
    - Failure: `{ "success": false, "error": { "code": "...", "message": "..." }, "request_id": "req_..." }`

    Each response also carries an `X-Request-Id` header.

    ## Authentication & scopes
    Provide an API key either as a Bearer token (`Authorization: Bearer <key>`)
    or via the `X-Api-Key` header. Keys carry scopes: `read`, `write`, `admin`
    (an `admin` key implicitly satisfies `read` and `write`). Each operation
    documents the scope it requires.

    ## Amounts
    On-chain / mote amounts are serialized as **decimal strings** (bigints are
    stringified). Fiat amounts use decimal money strings like `"100.00"`.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /
    description: Cred402 gateway (versioned routes are served under /v1)
tags:
  - name: System
    description: Health and service metadata.
  - name: Agents
    description: Agent registry, passports, and credit explainability.
  - name: Credit
    description: Credit pool, credit lines, draws and repayments.
  - name: RealFi
    description: RealFi protocol state, operator verification, and fiat receipts.
  - name: Compliance
    description: Compliance screening for agents.
  - name: Analytics
    description: Protocol analytics, economics, notifications, and search.
  - name: Marketplace
    description: Marketplace view.
  - name: Disputes
    description: Dispute lifecycle.
  - name: Admin
    description: API key management and webhook subscriptions (admin scope).

security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:
  /v1/config:
    get:
      tags: [System]
      operationId: getProtocolConfig
      summary: Protocol config (rulebook)
      description: "The live protocol parameters: fee schedule, credit gates (min reputation, max exposure), and the reputation-tier perk table. **Requires `read` scope.**"
      responses:
        "200":
          description: Protocol config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Service health
      description: |
        Liveness and basic environment/policy info. **Requires `read` scope.**
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/batch:
    post:
      tags: [Agents]
      operationId: registerAgents
      summary: Register a batch of agents
      description: "Register up to 100 agents in one call (operator fleet onboarding); returns per-item ok/error so a duplicate doesn't abort the batch. **Requires `write` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agents]
              properties:
                agents:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                    required: [agent_id, service_type]
                    properties:
                      agent_id: { type: string }
                      service_type: { type: string }
      responses:
        "200":
          description: Per-item registration results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents:
    get:
      tags: [Agents]
      operationId: listAgents
      summary: List agents
      description: "List every registered agent. **Requires `read` scope.**"
      responses:
        "200":
          description: Array of agents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      tags: [Agents]
      operationId: registerAgent
      summary: Register an agent
      description: |
        Register a new agent and return its freshly built passport.
        **Requires `write` scope.**
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterAgentRequest"
            example:
              agent_id: "solar-oracle-1"
              service_type: "solar_output_verification"
              agent_public_key: "01"
              owner_public_key: "01"
      responses:
        "200":
          description: The registered agent's passport.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassportResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}:
    get:
      tags: [Agents]
      operationId: getAgent
      summary: Get an agent
      description: "Fetch a single agent by id. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: The agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/passport:
    get:
      tags: [Agents]
      operationId: getAgentPassport
      summary: Get an agent passport
      description: "Build and return the agent's passport. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: The agent passport.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassportResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/credit-line:
    get:
      tags: [Agents, Credit]
      operationId: getAgentCreditLine
      summary: Get an agent's credit line
      description: "Fetch the credit line for an agent. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: The credit line.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLineResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/credit-explain:
    get:
      tags: [Agents, Credit]
      operationId: getAgentCreditExplain
      summary: Explain an agent's credit decision
      description: "Return the explainability breakdown for an agent's credit. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Credit explainability payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/compliance/agents/{id}:
    get:
      tags: [Compliance]
      operationId: getComplianceScreen
      summary: Screen an agent for compliance
      description: "Run a compliance screen for an agent. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Compliance screening result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/history:
    get:
      tags: [Agents, Credit]
      operationId: getCreditHistory
      summary: Agent credit history (credit file)
      description: "Every on-chain event concerning the agent in chronological order, categorized (identity/revenue/credit/dispute/reputation/crosschain). **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Credit history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/auth/wallet/challenge:
    post:
      tags: [System]
      operationId: walletChallenge
      summary: Issue a sign-in challenge for a Casper account
      description: "Start sign-in-with-Casper-Wallet: returns a one-time nonce + message for the wallet to sign. **Requires `read` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account]
              properties:
                account: { type: string, description: "Casper ed25519 public key (01 + 64 hex)." }
      responses:
        "200":
          description: The challenge to sign.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/auth/wallet/verify:
    post:
      tags: [System]
      operationId: walletVerify
      summary: Verify a signed challenge → mint a session
      description: "Complete sign-in: verifies the wallet's ed25519 signature over the challenge and mints a session token. **Requires `read` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nonce, signature]
              properties:
                nonce: { type: string }
                signature: { type: string, description: "ed25519 signature hex." }
      responses:
        "200":
          description: The minted session (or an error).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/auth/wallet/agents:
    get:
      tags: [System, Agents]
      operationId: getWalletAgents
      summary: Agents owned by the signed-in wallet
      description: "Returns the agents whose owner key matches the wallet account behind a session token. **Requires `read` scope.**"
      parameters:
        - { name: token, in: query, required: true, schema: { type: string }, description: Wallet session token from /verify. }
      responses:
        "200":
          description: Owned agents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "400": { $ref: "#/components/responses/Unauthorized" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/safe-draw:
    get:
      tags: [Credit]
      operationId: getSafeDraw
      summary: Safe-draw advisor
      description: "The largest additional draw that keeps the agent's line at or above a target health factor (default 1.5×), bounded by line headroom and pool free liquidity. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - { name: target_hf_bps, in: query, required: false, schema: { type: integer, default: 15000 }, description: "Target health factor in bps (10000 = 1.0×)." }
      responses:
        "200":
          description: Safe-draw advice.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/credit-cost:
    get:
      tags: [Credit]
      operationId: getCreditCost
      summary: Itemized cost of a draw
      description: "The full cost of a specific draw against the agent's line: upfront origination fee, prorated interest over the term, total repayment and effective all-in cost. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - { name: draw_cspr, in: query, required: true, schema: { type: number }, description: Draw amount in CSPR. }
      responses:
        "200":
          description: Cost breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/dossier:
    get:
      tags: [Agents]
      operationId: getAgentDossier
      summary: One-call agent dossier
      description: "Integrator snapshot bundling the bureau view (tier, health, readiness, benchmark percentile, reputation momentum, credit line, operator) in a single round-trip. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent dossier.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/similar:
    get:
      tags: [Agents]
      operationId: getSimilarAgents
      summary: Comparable alternative agents
      description: "'You might also consider' — same-category peers ranked by closeness in standing (reputation + credit) and overall discovery strength. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - { name: limit, in: query, required: false, schema: { type: integer, default: 5, maximum: 50 } }
      responses:
        "200":
          description: Similar agents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/health:
    get:
      tags: [Agents]
      operationId: getAgentHealth
      summary: Agent health badge (green/amber/red)
      description: "A glanceable green/amber/red verdict (worst-of reputation, fraud risk, open disputes, credit-line status) with a composite score and driving factors. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Health badge.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/multichain:
    get:
      tags: [Agents]
      operationId: getAgentMultichain
      summary: Agent cross-chain footprint
      description: "An agent's address bindings, Casper-anchored external receipts, Credit Authorization Notes per satellite chain, and shared global exposure. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Cross-chain summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/reputation-breakdown:
    get:
      tags: [Agents]
      operationId: getReputationBreakdown
      summary: Reputation score breakdown
      description: "Per-dimension breakdown of the agent's composite reputation (quality, timeliness, dispute, revenue, repayment, category expertise, collusion penalty) with each dimension's value, weight and contribution. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Reputation breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/score-trend:
    get:
      tags: [Agents, Credit]
      operationId: getScoreTrend
      summary: Credit-score & reputation trend
      description: "The agent's credit-score and reputation trajectory over time (current, net change, points), reconstructed from the event log. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Score trend.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/readiness:
    get:
      tags: [Agents, Credit]
      operationId: getOnboardingReadiness
      summary: Agent onboarding readiness scorecard
      description: "Pass/fail checklist of the gates an agent must satisfy to qualify for credit, with guidance and an overall readiness percentage. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Onboarding scorecard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/{id}/benchmark:
    get:
      tags: [Agents]
      operationId: getPeerBenchmark
      summary: Peer benchmark for an agent
      description: "Percentile and rank of an agent against its service-type cohort across reputation, credit score, revenue and fraud. **Requires `read` scope.**"
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Peer benchmark.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/compliance/report:
    get:
      tags: [Compliance]
      operationId: getComplianceReport
      summary: Per-jurisdiction compliance report
      description: "Operators grouped by jurisdiction with KYB coverage and sanctions exposure. **Requires `read` scope.**"
      responses:
        "200":
          description: Compliance report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/analytics/categories:
    get:
      tags: [Analytics]
      operationId: getCategoryAnalytics
      summary: Service-category market analytics
      description: "Market intelligence aggregated by service type: per-category agent supply, average reputation/credit, total receipts and revenue, and the top earner. **Requires `read` scope.**"
      responses:
        "200":
          description: Category analytics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/analytics/marketplace:
    get:
      tags: [Analytics, Marketplace]
      operationId: getMarketplaceStats
      summary: Marketplace supply statistics
      description: "Supply-side stats for the agent service marketplace: listings by category and pricing strategy, the price range, average seller reputation, and the most active sellers. **Requires `read` scope.**"
      responses:
        "200":
          description: Marketplace statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/analytics/x402:
    get:
      tags: [Analytics]
      operationId: getX402Stats
      summary: x402 receipt-network statistics
      description: "Analytics for the x402 receipt network (Product B): total volume, settlement-status breakdown, finalization rate, top sellers/payers, and per-service volume. **Requires `read` scope.**"
      responses:
        "200":
          description: x402 network statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/analytics/disputes:
    get:
      tags: [Analytics]
      operationId: getDisputeStats
      summary: Protocol dispute statistics
      description: "Protocol-level dispute intelligence: totals, open/resolved, outcomes by verdict and type, total slashed, resolution and agent-loss rates, and the most-disputed agent. **Requires `read` scope.**"
      responses:
        "200":
          description: Dispute statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/analytics/reputation-movers:
    get:
      tags: [Analytics]
      operationId: getReputationMovers
      summary: Reputation gainers & losers
      description: "Biggest net reputation gainers and losers, reconstructed from the event log — momentum, not just level. **Requires `read` scope.**"
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, default: 5, maximum: 50 } }
      responses:
        "200":
          description: Reputation movers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/agents/compare:
    get:
      tags: [Agents]
      operationId: compareAgents
      summary: Compare two agents side by side
      description: "Side-by-side comparison of two agents across discovery score, reputation, credit, trust, revenue, fraud and dispute rate, with a per-metric and overall winner. **Requires `read` scope.**"
      parameters:
        - { name: a, in: query, required: true, schema: { type: string } }
        - { name: b, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Comparison.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/discovery:
    get:
      tags: [Agents]
      operationId: discoverAgents
      summary: Discover and rank agents
      description: "Buyer-facing agent ranking fusing reputation, creditworthiness, web-of-trust, tier and a fraud penalty into one 0..100 score. **Requires `read` scope.**"
      parameters:
        - { name: service_type, in: query, required: false, schema: { type: string }, description: Filter by service type. }
