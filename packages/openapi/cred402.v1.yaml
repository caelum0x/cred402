              amount_cspr: 250
      responses:
        "200":
          description: Repayment result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/disputes:
    post:
      tags: [Disputes]
      operationId: openDispute
      summary: Open a dispute
      description: "Open a dispute against a respondent agent. **Requires `write` scope.**"
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenDisputeRequest"
            example:
              respondent_agent: "solar-oracle-1"
              dispute_type: "fake_receipt"
              receipt_id: "rcpt_8f2a"
              note: "evidence hash does not match observed output"
      responses:
        "200":
          description: The opened dispute.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/realfi:
    get:
      tags: [RealFi]
      operationId: getRealfiState
      summary: RealFi state
      description: "RealFi protocol state. **Requires `read` scope.**"
      responses:
        "200":
          description: RealFi state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/realfi/operators:
    post:
      tags: [RealFi]
      operationId: verifyOperator
      summary: Verify a RealFi operator
      description: "Verify a RealFi operator. **Requires `write` scope.**"
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOperatorRequest"
            example:
              operator_id: "op-acme-energy"
              verification_level: "business_verified"
              jurisdiction: "US"
              verification_reference: "kyb-ref-001"
      responses:
        "200":
          description: Verified operator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/realfi/fiat-receipts:
    post:
      tags: [RealFi]
      operationId: recordFiatReceipt
      summary: Record a fiat receipt
      description: "Record a fiat receipt for a seller agent. **Requires `write` scope.**"
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FiatReceiptRequest"
            example:
              seller_agent: "solar-oracle-1"
              operator_id: "op-acme-energy"
              amount: "100.00"
              currency: "USD"
              service_type: "rwa.weather_risk"
              provider_event_id: "evt_001"
              provider_receipt_id: "prcpt_001"
      responses:
        "200":
          description: Recorded fiat receipt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/admin/api-keys:
    get:
      tags: [Admin]
      operationId: listApiKeys
      summary: List API keys
      description: "List API key metadata (never the secret/hash). **Requires `admin` scope.**"
      responses:
        "200":
          description: Array of API key metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      tags: [Admin]
      operationId: issueApiKey
      summary: Issue an API key
      description: |
        Mint a new scoped API key. The full secret is returned **once** and never
        stored. **Requires `admin` scope.**
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueApiKeyRequest"
            example:
              name: "ci-pipeline"
              scopes: ["read", "write"]
      responses:
        "200":
          description: The issued key (secret returned once).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedKeyResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/webhooks/deliveries:
    get:
      tags: [System]
      operationId: getWebhookDeliveries
      summary: Recent webhook delivery attempts
      description: "The recent webhook delivery log (delivered/failed, http status, attempts) for integrator debugging, optionally filtered by subscription. **Requires `admin` scope.**"
      parameters:
        - { name: subscription_id, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Delivery attempts (newest first).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/webhooks:
    get:
      tags: [Admin]
      operationId: listWebhooks
      summary: List webhook subscriptions
      description: "List webhook subscriptions (never the secret). **Requires `admin` scope.**"
      responses:
        "200":
          description: Array of webhook subscriptions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      tags: [Admin]
      operationId: subscribeWebhook
      summary: Subscribe a webhook
      description: |
        Subscribe an HTTP(S) endpoint to protocol events. The subscription secret
        is returned once. **Requires `admin` scope.**
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeWebhookRequest"
            example:
              url: "https://example.com/cred402/hooks"
              events: ["*"]
      responses:
        "200":
          description: The created webhook subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscriptionResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "429": { $ref: "#/components/responses/RateLimited" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API key presented as `Authorization: Bearer <key>`."
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: "API key presented in the `X-Api-Key` header."

  parameters:
    AgentId:
      name: id
      in: path
      required: true
      description: Agent id.
      schema:
        type: string
        minLength: 2
        maxLength: 64
      example: "solar-oracle-1"
    CreditLineId:
      name: id
      in: path
      required: true
      description: Credit line / agent id the line belongs to.
      schema: { type: string }
      example: "solar-oracle-1"
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Optional idempotency key for safe retries of this mutation. When present,
        a replayed request with the same key and identical body returns the
        original stored response instead of re-running the handler.
      schema: { type: string }
      example: "idem-7f3c9a21"

  responses:
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
          example:
            success: false
            error: { code: "unauthorized", message: "missing or invalid API key" }
            request_id: "req_9f12ab34cd56ef78"
    Forbidden:
      description: API key lacks the required scope.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
          example:
            success: false
            error: { code: "forbidden", message: "requires 'write' scope" }
            request_id: "req_9f12ab34cd56ef78"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
          example:
            success: false
            error: { code: "not_found", message: "agent not found" }
            request_id: "req_9f12ab34cd56ef78"
    ValidationError:
      description: Request body failed validation (or was not valid JSON).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
          example:
            success: false
            error: { code: "validation_error", message: "agent_id: shorter than 2" }
            request_id: "req_9f12ab34cd56ef78"
    Unprocessable:
      description: Domain invariant violation (e.g. ledger rejected the operation).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
          example:
            success: false
            error: { code: "unprocessable", message: "credit line is frozen" }
            request_id: "req_9f12ab34cd56ef78"
    RateLimited:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
          example:
            success: false
            error: { code: "rate_limited", message: "rate limit exceeded" }
            request_id: "req_9f12ab34cd56ef78"

  schemas:
    # -- envelope -------------------------------------------------------------
    RequestId:
      type: string
      description: Per-request id, also returned as the X-Request-Id header.
      example: "req_9f12ab34cd56ef78"
    ApiError:
      type: object
      description: The failure envelope returned for every error.
      required: [success, error, request_id]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code.
              enum:
                - not_found
                - validation_error
                - invalid_json
                - unauthorized
                - forbidden
                - conflict
                - rate_limited
                - unprocessable
                - internal_error
            message:
              type: string
              description: Human-readable error message.
        request_id:
          $ref: "#/components/schemas/RequestId"

    # -- domain payloads ------------------------------------------------------
    Agent:
      type: object
      description: A registered agent (canonical ledger record).
      properties:
        agent_id: { type: string, example: "solar-oracle-1" }
        service_type:
          $ref: "#/components/schemas/ServiceType"
        reputation_score: { type: integer, example: 80 }
        credit_score: { type: integer, example: 640 }
        dispute_rate: { type: number, example: 0.0 }
      additionalProperties: true

    Passport:
      type: object
      description: An agent passport (identity + reputation + credit summary).
      additionalProperties: true

    CreditLine:
      type: object
      description: A credit line. Mote amounts are decimal strings.
      properties:
        agent_id: { type: string, example: "solar-oracle-1" }
        status: { type: string, example: "active" }
        max_credit: { type: string, description: "Mote amount (decimal string).", example: "5000000000000" }
        drawn: { type: string, description: "Mote amount (decimal string).", example: "1000000000000" }
      additionalProperties: true

    PoolState:
      type: object
      description: Credit pool state. Mote amounts are decimal strings.
      properties:
        total_liquidity: { type: string, example: "100000000000000" }
        outstanding_credit: { type: string, example: "25000000000000" }
        interest_accrued: { type: string, example: "120000000000" }
        defaults: { type: integer, example: 0 }
      additionalProperties: true

    Receipt:
      type: object
      description: An x402 receipt. The `amount` is a mote decimal string.
      properties:
        receipt_id: { type: string, example: "rcpt_8f2a" }
        payer_agent: { type: string, example: "buyer-1" }
        seller_agent: { type: string, example: "solar-oracle-1" }
        amount: { type: string, description: "Mote amount (decimal string).", example: "1000000000" }
        status: { type: string, example: "finalized" }
      additionalProperties: true

    ServiceType:
      type: string
      description: Agent service type.
      enum:
        - solar_output_verification
        - weather_risk
        - receivable_quality
        - risk_scoring
        - treasury_routing
        - monitoring
      example: "solar_output_verification"

    VerificationLevel:
      type: string
      description: RealFi operator verification level.
      enum:
        - unverified
        - email_verified
        - business_verified
        - regulated_entity
      example: "business_verified"

    DisputeType:
      type: string
      description: Dispute classification.
      enum:
        - bad_evidence
        - fake_receipt
        - non_delivery
        - agent_default
        - collusion
      example: "bad_evidence"

    Scope:
      type: string
      enum: [read, write, admin]

    HealthData:
      type: object
      required: [ok, env, policy]
      properties:
        ok: { type: boolean, const: true }
        env: { type: string, example: "production" }
        policy: { type: string, description: "Active risk policy version.", example: "v3" }

    AnalyticsView:
      type: object
      description: Live protocol analytics read-model.
      required: [generated_at, totals, pool, x402, risk, leaderboard, credit_timeline]
      properties:
        generated_at: { type: integer, description: "Epoch ms.", example: 1718539200000 }
        totals:
          type: object
          required:
            [agents, receipts, finalized_receipts, evidence, verified_evidence, rwa_assets, disputes, open_disputes, fiat_receipts]
          properties:
            agents: { type: integer, example: 12 }
            receipts: { type: integer, example: 340 }
            finalized_receipts: { type: integer, example: 300 }
            evidence: { type: integer, example: 88 }
            verified_evidence: { type: integer, example: 80 }
            rwa_assets: { type: integer, example: 15 }
            disputes: { type: integer, example: 3 }
            open_disputes: { type: integer, example: 1 }
            fiat_receipts: { type: integer, example: 9 }
        pool:
          type: object
          required: [tvl_motes, outstanding_motes, interest_accrued_motes, utilization, open_credit_lines, defaults]
          properties:
            tvl_motes: { type: string, example: "100000000000000" }
            outstanding_motes: { type: string, example: "25000000000000" }
            interest_accrued_motes: { type: string, example: "120000000000" }
            utilization: { type: number, example: 0.25 }
            open_credit_lines: { type: integer, example: 8 }
            defaults: { type: integer, example: 0 }
        x402:
          type: object
          required: [total_volume_motes, avg_receipt_motes, settled_rate]
          properties:
            total_volume_motes: { type: string, example: "340000000000" }
            avg_receipt_motes: { type: string, example: "1000000000" }
            settled_rate: { type: number, example: 0.97 }
        risk:
          type: object
          required: [avg_reputation, avg_credit_score, high_fraud_agents, avg_dispute_rate]
          properties:
            avg_reputation: { type: integer, example: 78 }
            avg_credit_score: { type: integer, example: 632 }
            high_fraud_agents: { type: integer, example: 0 }
            avg_dispute_rate: { type: number, example: 0.01 }
        leaderboard:
          type: array
          items: { $ref: "#/components/schemas/AgentLeaderRow" }
        credit_timeline:
          type: array
          items: { $ref: "#/components/schemas/TimelinePoint" }

    AgentLeaderRow:
      type: object
      required:
        [agent_id, service_type, reputation, credit_score, revenue_motes, receipts, credit_line_motes, fraud_score]
      properties:
        agent_id: { type: string, example: "solar-oracle-1" }
        service_type: { type: string, example: "solar_output_verification" }
        reputation: { type: integer, example: 80 }
        credit_score: { type: integer, example: 640 }
        revenue_motes: { type: string, example: "120000000000" }
        receipts: { type: integer, example: 42 }
        credit_line_motes: { type: string, example: "5000000000000" }
        fraud_score: { type: integer, example: 5 }

    TimelinePoint:
      type: object
      required: [seq, event]
      properties:
        seq: { type: integer, example: 1024 }
        event: { type: string, example: "CreditDrawn" }
        agent_id: { type: string, example: "solar-oracle-1" }
        amount_motes: { type: string, example: "1000000000000" }

    Notification:
      type: object
      required: [id, seq, severity, title, detail, timestamp]
      properties:
        id: { type: string, example: "ntf-1024" }
        seq: { type: integer, example: 1024 }
        severity:
          type: string
          enum: [info, success, warning, critical]
          example: "success"
        title: { type: string, example: "Credit line approved" }
        detail: { type: string, example: "solar-oracle-1 · up to 5000.00 CSPR" }
        agent_id: { type: string, example: "solar-oracle-1" }
        timestamp: { type: integer, description: "Epoch ms.", example: 1718539200000 }

    SearchResult:
      type: object
      required: [kind, id, label, detail]
      properties:
        kind:
          type: string
          enum: [agent, receipt, evidence, asset, credit_line, dispute, transaction]
          example: "agent"
        id: { type: string, example: "solar-oracle-1" }
        label: { type: string, example: "solar-oracle-1" }
        detail: { type: string, example: "solar_output_verification · rep 80 · score 640" }

    ApiKeyRecordPublic:
      type: object
      description: Public API key metadata (the secret/hash is never included).
      required: [id, name, scopes, created_at]
      properties:
        id: { type: string, example: "k_a1b2c3d4e5f6" }
        name: { type: string, example: "ci-pipeline" }
        scopes:
          type: array
          items: { $ref: "#/components/schemas/Scope" }
          example: ["read", "write"]
        created_at: { type: integer, description: "Epoch ms.", example: 1718539200000 }
        revoked_at: { type: integer, description: "Epoch ms; present when revoked." }
        last_used_at: { type: integer, description: "Epoch ms; present after first use." }

    IssuedKey:
      type: object
      description: A freshly issued key. The secret is returned ONCE.
      required: [id, secret, scopes]
      properties:
        id: { type: string, example: "k_a1b2c3d4e5f6" }
        secret:
          type: string
          description: The full secret, shown once and never stored.
          example: "c402_k_a1b2c3d4e5f6_Xy7Z..."
        scopes:
          type: array
          items: { $ref: "#/components/schemas/Scope" }
          example: ["read", "write"]

    WebhookSubscriptionPublic:
      type: object
      description: Webhook subscription metadata (the secret is never listed).
      required: [id, url, events, created_at]
      properties:
        id: { type: string, example: "wh_a1b2c3d4e5f6" }
        url: { type: string, format: uri, example: "https://example.com/cred402/hooks" }
        events:
          type: array
          items: { type: string }
          example: ["*"]
        created_at: { type: integer, description: "Epoch ms.", example: 1718539200000 }
        disabled_at: { type: integer, description: "Epoch ms; present when disabled." }

    WebhookSubscriptionWithSecret:
      allOf:
        - $ref: "#/components/schemas/WebhookSubscriptionPublic"
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: The signing secret, returned at subscription time.
              example: "whsec_Xy7Z..."

    # -- request bodies -------------------------------------------------------
    RegisterAgentRequest:
      type: object
      required: [agent_id, service_type]
      properties:
        agent_id:
          type: string
          minLength: 2
          maxLength: 64
          example: "solar-oracle-1"
        service_type:
          $ref: "#/components/schemas/ServiceType"
        agent_public_key:
          type: string
          maxLength: 130
          default: "01"
          example: "01"
        owner_public_key:
          type: string
          maxLength: 130
          default: "01"
          example: "01"
      additionalProperties: false

    CreateCreditLineRequest:
      type: object
      required: [agent_id]
      properties:
        agent_id:
          type: string
          minLength: 2
          example: "solar-oracle-1"
        term_days:
          type: integer
          minimum: 1
          maximum: 365
          example: 30
      additionalProperties: false

    AmountCsprRequest:
      type: object
      required: [amount_cspr]
      properties:
        amount_cspr:
          type: number
          minimum: 0
          description: Amount in CSPR.
          example: 1000
      additionalProperties: false

    OpenDisputeRequest:
      type: object
      required: [respondent_agent]
      properties:
        respondent_agent:
          type: string
          minLength: 2
          example: "solar-oracle-1"
        dispute_type:
          allOf:
            - $ref: "#/components/schemas/DisputeType"
          default: "bad_evidence"
        receipt_id:
          type: string
          example: "rcpt_8f2a"
        note:
          type: string
          maxLength: 500
          default: "opened via v1 API"
          example: "evidence hash does not match observed output"
      additionalProperties: false

    VerifyOperatorRequest:
      type: object
      required: [operator_id, verification_reference]
      properties:
        operator_id:
          type: string
          minLength: 2
          example: "op-acme-energy"
        verification_level:
          allOf:
            - $ref: "#/components/schemas/VerificationLevel"
          default: "business_verified"
        jurisdiction:
          type: string
          minLength: 2
          maxLength: 2
          default: "US"
          description: ISO 3166-1 alpha-2 jurisdiction code.
          example: "US"
        verification_reference:
          type: string
          minLength: 1
          example: "kyb-ref-001"
      additionalProperties: false

    FiatReceiptRequest:
      type: object
      required: [seller_agent, operator_id, amount, provider_event_id, provider_receipt_id]
      properties:
        seller_agent:
          type: string
          minLength: 2
          example: "solar-oracle-1"
        operator_id:
          type: string
          minLength: 2
          example: "op-acme-energy"
        amount:
          type: string
          pattern: '^\d+(\.\d+)?$'
          description: Decimal money string.
          example: "100.00"
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: "USD"
          example: "USD"
        service_type:
          type: string
          default: "rwa.weather_risk"
          example: "rwa.weather_risk"
        provider_event_id:
          type: string
          minLength: 1
          example: "evt_001"
        provider_receipt_id:
          type: string
          minLength: 1
          example: "prcpt_001"
      additionalProperties: false

    IssueApiKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          example: "ci-pipeline"
        scopes:
          type: array
          maxItems: 3
          items: { $ref: "#/components/schemas/Scope" }
          example: ["read", "write"]
      additionalProperties: false

    SubscribeWebhookRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          minLength: 8
          description: HTTP(S) endpoint that will receive signed event deliveries.
          example: "https://example.com/cred402/hooks"
        events:
          type: array
          maxItems: 50
          default: ["*"]
          items: { type: string }
          description: Event names to subscribe to, or ["*"] for all.
          example: ["*"]
      additionalProperties: false

