[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
# via_ir avoids "stack too deep" in the credit-note verifier and keeps the whole
# satellite suite (incl. Cred402RealFiMirror) compiling reproducibly.
via_ir = true
ffi = false
fs_permissions = [{ access = "read", path = "./" }]

[profile.default.fuzz]
runs = 256

# Real testnet targets (p10). Set the RPC env vars in .env, then:
#   forge script script/Deploy.s.sol:Deploy --rpc-url base_sepolia --broadcast
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"

# Cred402 EVM satellite.
# "Casper-rooted, chain-executed." EVM executes credit; Casper approves credit.
