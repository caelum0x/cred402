[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.17"

[features]
resolution = true
skip-lint = false

[programs.localnet]
cred402_satellite_registry = "Cred402Reg1111111111111111111111111111111111"
cred402_receipt_outbox = "Cred402Rcpt111111111111111111111111111111111"
cred402_evidence_mirror = "Cred402Evid111111111111111111111111111111111"
cred402_credit_vault = "Cred402Vau1t11111111111111111111111111111111"
cred402_exposure_reporter = "Cred402Expo111111111111111111111111111111111"

[programs.devnet]
cred402_satellite_registry = "Cred402Reg1111111111111111111111111111111111"
cred402_receipt_outbox = "Cred402Rcpt111111111111111111111111111111111"
cred402_evidence_mirror = "Cred402Evid111111111111111111111111111111111"
cred402_credit_vault = "Cred402Vau1t11111111111111111111111111111111"
cred402_exposure_reporter = "Cred402Expo111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test.validator]
url = "https://api.devnet.solana.com"

[test]
startup_wait = 10000
shutdown_wait = 2000
