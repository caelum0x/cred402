[toolchain]
# Odra/casper-contract use `#![feature(...)]` (needs nightly) and `#[no_mangle]`
# on the panic lang item (rejected by nightlies ≳1.88). Modern transitive crypto
# deps (base64ct, zeroize…) need Cargo's edition2024 (stabilized in 1.85). The
# ~1.85–1.87 window satisfies BOTH, so pin a nightly there for reproducible wasm.
channel = "nightly-2025-01-15"
components = ["rustfmt", "clippy", "rust-src"]
targets = ["wasm32-unknown-unknown"]
