name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build

  demo:
    name: demo loop (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run demo
      - run: npm run demo:dispute
      - run: npm run mcp:demo

  contracts:
    name: odra contracts (fmt · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown
      - name: rustfmt check
        working-directory: contracts
        run: cargo fmt --all --check
      - name: build (best-effort — needs cargo-odra)
        working-directory: contracts
        continue-on-error: true
        run: |
          cargo install cargo-odra --locked || true
          cargo odra build || cargo build --release
